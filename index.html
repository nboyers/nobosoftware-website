<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nobos Software LLC</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="wrapper">
    <header class="header">
      <h1>Nobos Software LLC</h1>
    </header>

    <nav class="nav">
      <ul class="nav-list">
        <li class="nav-item"><a href="#about">About Us</a></li>
        <li class="nav-item"><a href="#apps">Our Apps</a></li>
        <li class="nav-item"><a href="#contact">Contact</a></li>
        <li class="nav-item"><a href="privacy.html">Privacy Policy</a></li>
      </ul>
    </nav>

    <main class="main-content">
      <section id="about" class="section">
        <h2>About Us</h2>
        <p>We are Nobos Software LLC, a leading software publishing company.</p>
      </section>

      <section id="apps" class="section">
        <h2>Our Apps</h2>
        <p>Check out our apps on:</p>
        <ul class="app-list">
          <li><a href="https://play.google.com/store/apps/developer?id=Nobos+Software+LLC" target="_blank">Google Play</a></li>
          <li><a href="https://apps.apple.com/developer/nobos-software-llc/idYourAppleID" target="_blank">Apple App Store</a></li>
        </ul>
      </section>

      <section id="contact">
        <h2>Contact Us</h2>
        <form action="mailto:hello@nobosoftware.com" method="post" enctype="text/plain">
          <label for="name">Name:</label>
          <input type="text" id="name" name="name"><br>
    
          <label for="email">Email:</label>
          <input type="email" id="email" name="email"><br>
    
          <label for="message">Message:</label><br>
          <textarea id="message" name="message" rows="4" cols="50"></textarea><br>
    
          <input type="submit" value="Send">
        </form>
      </section>
    </main>

    <footer class="footer">
      <p>Copyright 2023, Nobos Software LLC</p>
    </footer>
  </div>

</body>
</html>
